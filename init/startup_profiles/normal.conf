# MonoOS services.conf – normal boot profile
# Syntax: service <name> <binary> [args]
#           class <core|main|late_start|optional>
#           user  <uid>
#           group <gid>
#           [disabled] [oneshot] [critical]

service logd /system/bin/logd
    class core
    user  1036
    group 1036
    critical

service dbus /system/bin/dbus-daemon --system
    class core
    user  1001
    group 1001

service udevd /system/bin/udevd --daemon
    class core
    user  0
    group 0
    critical

service permission_service /system/bin/permission_service
    class core
    user  1000
    group 1000
    critical

service system_server /system/bin/system_server
    class main
    user  1000
    group 1000
    critical

service surface_flinger /system/bin/surfaceflinger
    class main
    user  1003
    group 1003 1004

service audio_server /system/bin/audioserver
    class main
    user  1041
    group 1041 1005

service camera_server /system/bin/cameraserver
    class main
    user  1047
    group 1047

service wifi_service /system/bin/wpa_supplicant -Dnl80211
    class main
    user  1010
    group 1010

service update_engine /system/bin/update_engine
    class late_start
    user  0
    group 0
    oneshot

service adb /system/bin/adbd
    class late_start
    user  2000
    group 2000
    disabled
