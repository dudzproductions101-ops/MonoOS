<?xml version="1.0" encoding="UTF-8"?>
<!--
  fonts.conf – MonoOS system font configuration
  Processed by fontconfig at boot to build the system font cache.
  Binary font files are stored in the vendor font package and installed
  to /system/fonts/ during build.  This file documents every typeface
  and maps generic family names used by the UI to their file paths.
-->
<fontconfig>

  <!-- ── MonoOS Sans (primary UI typeface) ───────────────────────────────── -->
  <!-- Thin / ExtraLight / Light / Regular / Medium / SemiBold / Bold / ExtraBold / Black -->
  <dir>/system/fonts/MonoOSSans</dir>

  <alias>
    <family>system-ui</family>
    <prefer><family>MonoOS Sans</family></prefer>
  </alias>

  <alias>
    <family>sans-serif</family>
    <prefer><family>MonoOS Sans</family></prefer>
  </alias>

  <!-- ── MonoOS Mono (terminal, code editor) ─────────────────────────────── -->
  <dir>/system/fonts/MonoOSMono</dir>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>MonoOS Mono</family>
      <family>Courier New</family>
    </prefer>
  </alias>

  <!-- ── Emoji ──────────────────────────────────────────────────────────── -->
  <!-- Noto Color Emoji via vendor package -->
  <dir>/system/fonts/Emoji</dir>

  <match target="pattern">
    <test qual="any" name="family"><string>emoji</string></test>
    <edit name="family" mode="assign" binding="same">
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <!-- ── CJK fallback ───────────────────────────────────────────────────── -->
  <dir>/system/fonts/CJK</dir>

  <!-- ── Arabic / Hebrew / Devanagari fallbacks ─────────────────────────── -->
  <dir>/system/fonts/Intl</dir>

  <!-- ── Font hinting and anti-aliasing ────────────────────────────────── -->
  <match target="font">
    <edit name="hinting"    mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle"  mode="assign"><const>hintslight</const></edit>
    <edit name="antialias"  mode="assign"><bool>true</bool></edit>
    <edit name="rgba"       mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter"  mode="assign"><const>lcddefault</const></edit>
  </match>

  <!-- Disable hinting for bold weights at large sizes (looks cleaner) -->
  <match target="font">
    <test name="weight" compare="more"><const>medium</const></test>
    <test name="pixelsize" compare="more"><double>24</double></test>
    <edit name="hinting" mode="assign"><bool>false</bool></edit>
  </match>

</fontconfig>
