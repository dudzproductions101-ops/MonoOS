<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400"
     width="400" height="400">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4DA6FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4DA6FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6EC3FF"/>
      <stop offset="100%" stop-color="#2A7DD4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#111111"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="200" rx="160" ry="160" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="100"
          fill="none" stroke="url(#logoGrad)" stroke-width="3" opacity="0.7"/>

  <!-- Inner circle (logo body) -->
  <circle cx="200" cy="200" r="72" fill="url(#logoGrad)"/>

  <!-- "1" letterform – stylised single vertical bar with serif cap -->
  <rect x="192" y="158" width="16" height="68" rx="4" fill="#FFFFFF"/>
  <rect x="181" y="158" width="16" height="10" rx="3" fill="#FFFFFF"/>

  <!-- Wordmark -->
  <text x="200" y="328" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="200" letter-spacing="8"
        fill="#FFFFFF" opacity="0.9">OneOS</text>
  <text x="200" y="352" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="300" letter-spacing="3"
        fill="#4DA6FF" opacity="0.8">by DudasCorp</text>
</svg>
