<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180"
     width="200" height="180">
  <!-- Card stack (3 photo frames) -->
  <rect x="50" y="50" width="100" height="80" rx="8" fill="#2C2C2E" transform="rotate(-8,100,90)"/>
  <rect x="50" y="50" width="100" height="80" rx="8" fill="#3A3A3C" transform="rotate(-3,100,90)"/>
  <rect x="50" y="50" width="100" height="80" rx="8" fill="#48484A"/>

  <!-- Mountain icon inside top card -->
  <polygon points="68,115 88,90 108,115" fill="#636366"/>
  <polygon points="92,115 108,95 124,115" fill="#8E8E93"/>
  <circle cx="116" cy="78" r="7" fill="#FFD60A"/>

  <!-- Label -->
  <text x="100" y="155" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="13" fill="#8E8E93">
    No photos yet
  </text>
</svg>
